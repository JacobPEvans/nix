# Overrides only — inherits defaults from shared workflow:
#   warn: 6144, error: 12288, scan: [.md, .nix, .tf], exempt: [CHANGELOG]
extended:
  limit: 32768
  files:
    - AGENTS
    - ANTHROPIC-ECOSYSTEM
    - TROUBLESHOOTING

exempt:
  - RUNBOOK
  - copilot-permissions-allow
  - copilot-permissions-ask
  - copilot-permissions-deny
  - gemini-permissions-allow
  - gemini-permissions-deny
