# Event-driven flake input updates
#
# Receives repository_dispatch events from upstream repos (nix-home, nix-ai)
# when they publish a new release. Updates the corresponding flake input and
# opens a PR. This turns poll-based Renovate updates (3-4 day lag) into
# event-driven updates (minutes after upstream release).
#
# Payload contract:
#   event_type: flake-input-updated
#   client_payload:
#     input_name: flake input to update (e.g. "nix-home")
#     version:    upstream release tag (e.g. "v1.18.0")
#     source_repo: repo that triggered this (e.g. "nix-home")
#
# Idempotent: repeated dispatches for the same input reuse the same branch,
# so peter-evans/create-pull-request updates the existing PR if unmerged.
name: Flake Input Dispatch

on:
  repository_dispatch:
    types: [flake-input-updated]

permissions: {}

jobs:
  update-input:
    name: Update ${{ github.event.client_payload.input_name }}
    runs-on: ubuntu-latest
    environment: automation
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Validate payload
        env:
          INPUT_NAME: ${{ github.event.client_payload.input_name }}
        run: |
          if [[ -z "$INPUT_NAME" ]]; then
            echo "::error::Missing client_payload.input_name"
            exit 1
          fi
          if [[ ! "$INPUT_NAME" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid input name: $INPUT_NAME"
            exit 1
          fi

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_ACTION_JACOBPEVANS_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Update flake input
        env:
          INPUT_NAME: ${{ github.event.client_payload.input_name }}
        run: nix flake update "$INPUT_NAME"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          sign-commits: true
          branch: chore/update-${{ github.event.client_payload.input_name }}
          delete-branch: true
          commit-message: "chore(deps): update ${{ github.event.client_payload.input_name }} to ${{ github.event.client_payload.version }}"
          title: "chore(deps): update ${{ github.event.client_payload.input_name }} to ${{ github.event.client_payload.version }}"
          body: |
            Automated flake input update triggered by [${{ github.event.client_payload.source_repo }}](https://github.com/JacobPEvans/${{ github.event.client_payload.source_repo }}) release `${{ github.event.client_payload.version }}`.

            Dispatched via `repository_dispatch` event `flake-input-updated`.
          labels: dependencies
